<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JustWork Application</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>Welcome to JustWork</h1>
            <button id="loginBtn">Login</button>
        </header>
        <main>
            <section id="dashboard">
                <h2>Dashboard</h2>
                <div id="tasks"></div>
            </section>
            <section id="taskManagement">
                <h2>Task Management</h2>
                <form id="taskForm">
                    <input type="text" id="taskName" placeholder="Task Name" required>
                    <input type="text" id="taskDescription" placeholder="Description" required>
                    <button type="submit">Add Task</button>
                </form>
            </section>
        </main>
        <footer>
            <p>&copy; 2026 JustWork</p>
        </footer>
    </div>
    <script src="https://www.gstatic.com/firebasejs/9.1.2/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.2/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.2/firebase-database.js"></script>
    <script>
        // Firebase configuration
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            databaseURL: "https://YOUR_PROJECT_ID.firebaseio.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        // Initialize Firebase
        const app = firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        // Authentication system
        document.getElementById('loginBtn').addEventListener('click', function() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).then(function(result) {
                console.log('User signed in:', result.user);
            }).catch(function(error) {
                console.error('Error signing in:', error);
            });
        });

        // Real-time listeners
        database.ref('tasks/').on('value', function(snapshot) {
            const tasks = snapshot.val();
            const tasksDiv = document.getElementById('tasks');
            tasksDiv.innerHTML = '';
            for (const id in tasks) {
                const task = tasks[id];
                tasksDiv.innerHTML += `<div>${task.name}: ${task.description}</div>`;
            }
        });

        // Task management
        document.getElementById('taskForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const taskName = document.getElementById('taskName').value;
            const taskDescription = document.getElementById('taskDescription').value;
            const newTaskRef = database.ref('tasks/').push();
            newTaskRef.set({ name: taskName, description: taskDescription });
            document.getElementById('taskForm').reset();
        });
    </script>
</body>
</html>
