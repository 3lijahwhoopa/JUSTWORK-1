<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JustWork</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      text-align: center;
      background: #0f172a;
      color: white;
    }
    .container {
      max-width: 600px;
      margin: 100px auto;
      padding: 20px;
    }
    h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }
    p {
      font-size: 18px;
      color: #cbd5f5;
    }
    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 20px;
      background: #3b82f6;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
    }
    input {
      padding: 10px;
      width: 70%;
      border-radius: 6px;
      border: none;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>JustWork 🚀</h1>
    <p>The easiest way for freelancers to manage clients, admin & taxes.</p>
    
    <input type="email" placeholder="Enter your email">
    <br>
    <a class="btn" href="#">Join Waitlist</a>

    <p style="margin-top:40px; font-size:14px;">
      Built for US freelancers & contractors 🇺🇸
    </p>
  </div>
</body>
</html>
